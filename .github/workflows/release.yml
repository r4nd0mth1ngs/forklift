name: release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-14
          - target: x86_64-apple-darwin
            os: macos-14
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
          - target: aarch64-unknown-linux-musl
            os: ubuntu-24.04-arm
          - target: x86_64-pc-windows-msvc
            os: windows-latest
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install musl tools
        if: contains(matrix.target, 'musl')
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: Add target
        run: rustup target add ${{ matrix.target }}

      # Only the two installable heads — the aws-lambda crate ships differently.
      - name: Build
        run: cargo build --release --locked --target ${{ matrix.target }} -p forklift -p forklift-server

      # Each head is its own archive so users can grab just the CLI or just the
      # server. Assets are named WITHOUT the version so the installer can use the
      # stable /releases/latest/download/ URL (no API calls, no rate limits).
      - name: Package (unix)
        if: runner.os != 'Windows'
        run: |
          mkdir -p dist
          d=target/${{ matrix.target }}/release
          tar -C "$d" -czf dist/forklift-${{ matrix.target }}.tar.gz forklift
          tar -C "$d" -czf dist/forklift-server-${{ matrix.target }}.tar.gz forklift-server

      - name: Package (windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force dist | Out-Null
          $d = "target/${{ matrix.target }}/release"
          Compress-Archive -Path "$d/forklift.exe"        -DestinationPath dist/forklift-${{ matrix.target }}.zip
          Compress-Archive -Path "$d/forklift-server.exe" -DestinationPath dist/forklift-server-${{ matrix.target }}.zip

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}
          path: dist/*

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Generate checksums
        run: cd dist && sha256sum * > checksums.txt

      - uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
