# Forklift CI: build + test on Linux, macOS and Windows.
#
# All dependencies come from crates.io (the private CodeArtifact registry became
# unnecessary when the CLI moved from `rust-cli-core` to clap), so no credentials or
# other setup is needed beyond a Rust toolchain.
name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: test (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install stable Rust
        run: rustup toolchain install stable --profile minimal --component clippy && rustup default stable

      - uses: Swatinem/rust-cache@v2

      - name: Build
        run: cargo build --verbose

      - name: Test
        run: cargo test --verbose

      - name: Clippy
        # Style-level lint debt is tracked separately; deny only warnings that indicate
        # correctness issues once the doc-comment cleanup lands. For now, report-only.
        run: cargo clippy
